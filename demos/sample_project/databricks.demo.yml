# This is a Databricks asset bundle definition for test_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: sample_project

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  file_path:
    default: ${workspace.file_path}
  source_catalog:
    description: The source catalog to read from
  source_schema:
    description: The source schema to read from
  kelp_project_file:
    description: Path to kelp project file
    default: ${workspace.file_path}/src/kelp_project_etl/kelp_project.yml
  kelp_dependency:
    description: The kelp-core whl dependency path
    default: /Volumes/workspace/default/libs/kelp_core-0.0.7-py3-none-any.whl

scripts:
  pre_deploy:
    content: |
      # This script runs before deployment. You can use it to, for example, generate files that are included in the bundle.
      echo "Running pre-deploy script"

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      profile: DEFAULT
    variables:
      catalog: kelp_catalog
      schema: default
      source_catalog: kelp_catalog
      source_schema: kelp_bronze

  prod:
    mode: production
    workspace:
      profile: DEFAULT
      root_path: /Workspace/Shared/deployments/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: kelp_prod
    permissions:
      - user_name: ${workspace.current_user.userName}
        level: CAN_MANAGE
