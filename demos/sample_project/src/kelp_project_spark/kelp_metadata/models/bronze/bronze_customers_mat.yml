kelp_models:
  - name: bronze_customers_mat
    description: Bronze customers snapshot loaded from in-function seed data.
    columns:
      - name: customer_id
        data_type: bigint
        description: Auto-generated surrogate id for the customer row.
        generated:
          type: identity
          as_default: true
      - name: country
        data_type: string
        description: Customer country from source.
      - name: first_name
        data_type: string
        description: Customer first name.
      - name: last_name
        data_type: string
        description: Customer last name.
      - name: user_id
        data_type: string
        description: Natural customer business key.
      - name: email
        data_type: string
        description: Customer email for enrichment.
      - name: customer_updated_at
        data_type: timestamp
        description: Source update timestamp for incremental filtering.
      - name: ingest_date
        data_type: date
        description: Date this record was produced in the bronze load.
    materialization:
      write_mode: overwrite
    cluster_by:
      - ingest_date
