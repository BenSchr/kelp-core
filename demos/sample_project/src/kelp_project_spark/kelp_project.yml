# yaml-language-server: $schema=/workspaces/kelp/.vscode/kelp_json_schema.json
kelp_project:
  models_path: "./kelp_metadata/models"
  quality_config:
    dqx_monitoring_fqn: ${catalog}.kelp_bronze.dqx_monitoring
    dqx_monitoring_enabled: true

  models:
    +catalog: ${ catalog }
    bronze:
      +schema: kelp_bronze

    silver:
      +schema: kelp_silver
    gold:
      +schema: kelp_gold
    +tags:
      kelp_managed: ""
      domain: "sales"
      owner: "analytics-team"

vars:
  catalog: kelp_catalog
  landing_schema: kelp_bronze

targets:
  dev:
    vars:
      catalog: ${catalog}

  prod:
    vars:
      catalog: ${catalog}
