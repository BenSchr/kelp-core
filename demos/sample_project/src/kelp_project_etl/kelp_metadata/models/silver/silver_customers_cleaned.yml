kelp_models:
- name: silver_customers_cleaned
  description: This is the silver cleaned customer model
  quality:
    engine: sdp
    expect_all_or_quarantine:
      country_not_unknown: lower(country) != 'unknown'
  columns:
  - name: country
    data_type: string
  - name: first_name
    data_type: string
  - name: last_name
    data_type: string
  - name: user_id
    data_type: string
