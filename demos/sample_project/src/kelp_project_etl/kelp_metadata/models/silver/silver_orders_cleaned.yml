kelp_models:
  - name: silver_orders_cleaned
    description: This is the silver cleaned customer model
    constraints:
      - name: pk_silver_orders
        type: primary_key
        columns:
          - order_id
      - name: fk_orders_user
        type: foreign_key
        columns:
          - user_id
        reference_table: silver_customers_cleaned
        reference_columns:
          - user_id
    quality:
      engine: dqx
      sdp_expect_level: warn
      sdp_quarantine: true
      checks:
        - check:
            function: is_in_list
            arguments:
              column: order_state
              allowed:
                - Pending
                - Shipped
                - Delivered
                - Cancelled
              case_sensitive: false
    columns:
      - name: order_id
        data_type: string
        tags:
          data_classification: internal
      - name: order_state
        data_type: string
      - name: price
        data_type: double
        tags:
          data_classification: internal
      - name: product
        data_type: string
      - name: quantity
        data_type: bigint
      - name: store
        data_type: string
      - name: user_id
        data_type: string
        tags:
          data_classification: pii
