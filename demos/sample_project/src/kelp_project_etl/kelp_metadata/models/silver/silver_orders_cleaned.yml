kelp_models:
  - name: silver_orders_cleaned
    description: "This is the silver cleaned customer model"
    quality:
      engine: "dqx"
      sdp_expect_level: warn
      sdp_quarantine: true
      checks:
        - check:
            function: is_in_list
            arguments:
              column: order_state
              allowed: ["Pending", "Shipped", "Delivered", "Cancelled"]
              case_sensitive: false
