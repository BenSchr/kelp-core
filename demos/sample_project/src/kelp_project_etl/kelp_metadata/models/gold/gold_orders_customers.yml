kelp_models:
  - table_type: materialized_view
    name: gold_orders_customers
    description:
      "Gold materialized view: enriched orders joined with customer attributes
      for analytics and reporting."
    constraints:
      - name: pk_1
        type: primary_key
        columns:
          - order_id
    columns:
      - name: order_id
        data_type: string
        description: Primary order identifier used to join and deduplicate orders.
        tags:
          business: key
          data_classification: internal
      - name: order_state
        data_type: string
        description: Order lifecycle state (e.g., Pending, Shipped, Delivered).
      - name: product
        data_type: string
      - name: quantity
        data_type: bigint
      - name: price
        data_type: double
        description: Unit price of the order line.
        tags:
          data_classification: internal
      - name: total_price
        data_type: double
        description: "Derived column: price * quantity. Use for revenue computations."
      - name: store
        data_type: string
      - name: user_id
        data_type: string
        description:
          Identifier for the customer/user; links back to bronze/silver customer
          tables.
        tags:
          pii: "false"
          data_classification: internal
      - name: country
        data_type: string
        description: Customer country from the customer record; useful for geo rollups.
        tags:
          data_classification: internal
    quality:
      engine: sdp
      expect_all_or_quarantine:
        price_non_negative: price >= 0
        quantity_non_negative: quantity >= 0
        order_id_present: order_id IS NOT NULL
