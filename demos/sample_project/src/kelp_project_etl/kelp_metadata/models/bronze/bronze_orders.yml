kelp_models:
  - table_type: streaming_table
    name: bronze_orders
    description: This is the orders model
    constraints:
      - name: pk_bronze_orders
        type: primary_key
        columns:
          - order_id
    auto_ttl:
      expire_in_days: 365
      timestamp_column: order_date
    cluster_by:
      - order_id

    columns:
      - name: order_id
        description: Unique identifier for each order
        data_type: string
        tags:
          business: key
          data_classification: internal
      - name: order_state
        data_type: string
        description: State of the order lifecycle (Pending, Shipped, etc.).
      - name: order_date
        data_type: timestamp
        description: Datetime when order was placed
      - name: price
        data_type: double
        description: Unit price for the order line.
        tags:
          sensitivity: low
          data_classification: internal
      - name: product
        data_type: string
        description: Product name or identifier.
      - name: quantity
        data_type: bigint
        description: Quantity ordered for the product.
      - name: store
        data_type: string
        description: Store identifier where the order was placed.
      - name: user_id
        data_type: string
        description: Identifier for the user who placed the order; can link to customers.
        tags:
          data_classification: pii
      - name: _rescued_data
        data_type: string
      - name: _errors
        data_type: array<struct<name:string,message:string,columns:array<string>,filter:string,function:string,run_time:timestamp,run_id:string,user_metadata:map<string,string>,rule_fingerprint:string,rule_set_fingerprint:string,skipped:boolean>>
        description: Structured errors captured by the ingestion/validation engine.
      - name: _warnings
        data_type: array<struct<name:string,message:string,columns:array<string>,filter:string,function:string,run_time:timestamp,run_id:string,user_metadata:map<string,string>,rule_fingerprint:string,rule_set_fingerprint:string,skipped:boolean>>
        description: Structured warnings captured by the ingestion/validation engine.
    quality:
      engine: dqx
      sdp_expect_level: fail
      checks:
        - check:
            function: is_null
            arguments:
              column: _rescued_data
