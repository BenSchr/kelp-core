kelp_metric_views:
  - name: customer_metrics
    description: Customer metrics view
    definition:
      version: 1.1
      source: ${ catalog_name }.${ schema_name }.orders
      dimensions:
        - name: customer_id
          expr: customer_id
          comment: Customer identifier
      measures:
        - name: total_orders
          expr: count(*)
          comment: Total number of orders
        - name: total_amount
          expr: sum(amount)
          comment: Total order amount
